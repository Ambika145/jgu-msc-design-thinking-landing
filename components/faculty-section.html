<!-- Meet Our Faculty -->
<section class="faculty" id="faculty">
  <div class="faculty__glow faculty__glow--left" aria-hidden="true"></div>
  <div class="faculty__glow faculty__glow--right" aria-hidden="true"></div>
  <div class="container faculty__inner">
    <header class="faculty__head">
      <h2 class="faculty__title">
        Meet <span class="faculty__title-accent">Our</span> Faculty
      </h2>
    </header>
    <div class="faculty__grid">
      <article class="faculty-card">
        <div class="faculty-card__stage">
          <div class="faculty-card__halo" aria-hidden="true"></div>
          <img
            class="faculty-card__photo"
            src="images/Group 40.png"
            alt="Prof. Kathleen A. Modrowski"
            width="210"
            height="210"
            loading="lazy"
          />
        </div>
        <div class="faculty-card__body">
          <h3 class="faculty-card__name">Prof. Kathleen A. Modrowski</h3>
          <div class="faculty-card__rule" aria-hidden="true"></div>
          <p class="faculty-card__role">Professor &amp; Dean</p>
        </div>
      </article>
      <article class="faculty-card">
        <div class="faculty-card__stage">
          <div class="faculty-card__halo" aria-hidden="true"></div>
          <img
            class="faculty-card__photo"
            src="images/Group 41.png"
            alt="Sunil Sangra"
            width="210"
            height="210"
            loading="lazy"
          />
        </div>
        <div class="faculty-card__body">
          <h3 class="faculty-card__name">Sunil Sangra</h3>
          <div class="faculty-card__rule" aria-hidden="true"></div>
          <p class="faculty-card__role">Professor of Management Practice</p>
        </div>
      </article>
      <article class="faculty-card">
        <div class="faculty-card__stage">
          <div class="faculty-card__halo" aria-hidden="true"></div>
          <img
            class="faculty-card__photo"
            src="images/Group 42.png"

            width="210"
            height="210"
            loading="lazy"
          />
        </div>
        <div class="faculty-card__body">
          <h3 class="faculty-card__name">Surendar Singh</h3>
          <div class="faculty-card__rule" aria-hidden="true"></div>
          <p class="faculty-card__role">Associate Professor, Jindal School of Liberal Arts &amp; Humanities</p>
        </div>
      </article>
      <article class="faculty-card">
        <div class="faculty-card__stage">
          <div class="faculty-card__halo" aria-hidden="true"></div>
          <img
            class="faculty-card__photo"
            src="images/Group 62.png"
            alt="Arushi Bathla"
            width="210"
            height="210"
            loading="lazy"
          />
        </div>
        <div class="faculty-card__body">
          <h3 class="faculty-card__name">Arushi Bathla</h3>
          <div class="faculty-card__rule" aria-hidden="true"></div>
          <p class="faculty-card__role">Lecturer</p>
        </div>
      </article>
    </div>
  </div>
</section>
